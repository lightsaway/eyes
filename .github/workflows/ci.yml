name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Build (Debug)
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Create app bundle
        run: make bundle

      - name: Verify bundle structure
        run: |
          test -f zig-out/Eyes.app/Contents/Info.plist
          test -f zig-out/Eyes.app/Contents/MacOS/eyes
          test -d zig-out/Eyes.app/Contents/Resources

      - name: Show binary size
        run: ls -lh zig-out/bin/eyes

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build (Debug)
        run: nix develop --command zig build

      - name: Run tests
        run: nix develop --command zig build test

      - name: Build (ReleaseFast)
        run: nix develop --command zig build -Doptimize=ReleaseFast

      - name: Verify binary
        run: |
          file zig-out/bin/eyes
          ls -lh zig-out/bin/eyes
