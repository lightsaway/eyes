name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Create app bundle
        run: make bundle

      - name: Create DMG
        run: make dmg

      - name: Package tarball
        run: |
          cd zig-out/bin
          tar czf ../../eyes-macos-arm64.tar.gz eyes

      - name: Zip app bundle
        run: |
          cd zig-out
          zip -r ../Eyes-macos-arm64.zip Eyes.app

      - name: Generate checksums
        run: |
          shasum -a 256 eyes-macos-arm64.tar.gz > checksums.txt
          shasum -a 256 Eyes-macos-arm64.zip >> checksums.txt
          shasum -a 256 zig-out/Eyes-${{ steps.version.outputs.version }}.dmg >> checksums.txt
          cat checksums.txt

      - name: Show binary size
        run: ls -lh zig-out/bin/eyes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            eyes-macos-arm64.tar.gz
            Eyes-macos-arm64.zip
            zig-out/Eyes-${{ steps.version.outputs.version }}.dmg
            checksums.txt
